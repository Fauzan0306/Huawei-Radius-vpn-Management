services:
  mariadb:
    image: mariadb:11.4
    container_name: huawei-radius-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: radius
      MARIADB_USER: radius
      MARIADB_PASSWORD: radius-password
      MARIADB_ROOT_PASSWORD: root-password
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$$MARIADB_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  freeradius:
    build:
      context: .
      dockerfile: docker/freeradius/Dockerfile
    container_name: huawei-radius-freeradius
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: radius
      DB_USER: radius
      DB_PASSWORD: radius-password
      RADIUS_CLIENT_IPADDR: 0.0.0.0/0
      RADIUS_CLIENT_SECRET: testing123
      RADIUS_CLIENT_SHORTNAME: docker-demo
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: huawei-radius-vpn-app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      CLIENT_URL: http://localhost:3010
      JWT_SECRET: docker-dev-secret-change-me
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      ADMIN_DISPLAY_NAME: Docker Demo Admin
      ADMIN_EMAIL: admin@example.com
      APP_TIMEZONE_OFFSET_MINUTES: -480
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: radius
      DB_PASSWORD: radius-password
      DB_NAME: radius
      SESSION_SOURCE: radius
      SESSION_INGEST_TOKEN: docker-demo-ingest-token
      HUAWEI_SESSION_SNAPSHOT_MODE: disabled
      HUAWEI_SYSLOG_LISTENER_ENABLED: "false"
    ports:
      - "3010:3000"

volumes:
  mariadb_data:

